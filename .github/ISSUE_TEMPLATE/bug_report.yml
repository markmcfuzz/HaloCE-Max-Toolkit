name: Bug report
description: Create a report to help us improve.
labels:
  - "bug"
body:
  - type: markdown
    attributes:
      value: |
        :information_source: Please select the `HCE Max Toolkit` Project, in the right side.
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description:
        A clear and concise description of what you expected to happen.
  - type: textarea
    attributes:
      label: Screenshots / Video
      description: If applicable, add screenshots or video to help explain your problem.
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
